<div class="relative py-24 bg-gradient-to-b from-{{ color }}-900/20 to-transparent border-b border-{{ color }}-900/20">
    <div class="container mx-auto px-8 text-center">
        <div class="inline-flex items-center gap-2 bg-{{ color }}-600/20 border border-{{ color }}-500/30 rounded-full px-4 py-1 text-sm text-{{ color }}-400 mb-6">
            <i class="{{ icon }}"></i> {{ badge }}
        </div>
        <h1 class="text-5xl md:text-6xl font-orbitron font-bold mb-4">{{ title }}</h1>
        <p class="text-xl text-gray-400 max-w-2xl mx-auto">{{ subtitle }}</p>
    </div>
</div>
