<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BEATLAB ACADEMY{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-black text-gray-100">

    <!-- NAVBAR -->
    <nav class="flex items-center justify-between px-8 py-6 sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-purple-900/30">
        <a href="{{ url_for('index') }}" class="text-2xl font-bold font-orbitron text-purple-500 tracking-tighter">
            BEAT<span class="text-white">LAB</span>
        </a>

        <div class="hidden md:flex items-center space-x-8 text-sm uppercase tracking-widest font-semibold">
            <a href="{{ url_for('index') }}#courses" class="hover:text-purple-400 transition">课程内容</a>
            <a href="{{ url_for('index') }}#gear" class="hover:text-purple-400 transition">器材指南</a>
            <a href="{{ url_for('index') }}#community" class="hover:text-purple-400 transition">社群</a>

            <!-- 学习板块下拉 -->
            <div class="relative group">
                <button class="flex items-center gap-1 hover:text-purple-400 transition">
                    学习
                    <i class="fas fa-chevron-down text-xs transition-transform duration-200 group-hover:rotate-180"></i>
                </button>
                <div class="absolute top-full left-1/2 -translate-x-1/2 mt-3 w-52 bg-zinc-900 border border-purple-900/40 rounded-xl shadow-2xl shadow-purple-900/20 overflow-hidden
                            opacity-0 invisible group-hover:opacity-100 group-hover:visible translate-y-2 group-hover:translate-y-0
                            transition-all duration-200 ease-out">
                    <div class="p-2 flex flex-col gap-1">
                        <a href="{{ url_for('learn_basics') }}"
                           class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-purple-600/20 hover:text-purple-300 transition group/item">
                            <span class="w-8 h-8 bg-purple-600/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-seedling text-purple-400 text-sm"></i>
                            </span>
                            <div>
                                <div class="font-semibold text-sm normal-case tracking-normal">基础知识入门</div>
                                <div class="text-xs text-gray-500 normal-case tracking-normal">BPM、节拍、Rekordbox</div>
                            </div>
                        </a>
                        <a href="{{ url_for('learn_intermediate') }}"
                           class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-blue-600/20 hover:text-blue-300 transition group/item">
                            <span class="w-8 h-8 bg-blue-600/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-layer-group text-blue-400 text-sm"></i>
                            </span>
                            <div>
                                <div class="font-semibold text-sm normal-case tracking-normal">进阶篇</div>
                                <div class="text-xs text-gray-500 normal-case tracking-normal">EQ、调性混音、效果器</div>
                            </div>
                        </a>
                        <a href="{{ url_for('learn_advanced') }}"
                           class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-pink-600/20 hover:text-pink-300 transition group/item">
                            <span class="w-8 h-8 bg-pink-600/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-fire text-pink-400 text-sm"></i>
                            </span>
                            <div>
                                <div class="font-semibold text-sm normal-case tracking-normal">实战篇</div>
                                <div class="text-xs text-gray-500 normal-case tracking-normal">舞台表现、俱乐部演出</div>
                            </div>
                        </a>
                        <a href="{{ url_for('learn_resources') }}"
                           class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-emerald-600/20 hover:text-emerald-300 transition group/item">
                            <span class="w-8 h-8 bg-emerald-600/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-link text-emerald-400 text-sm"></i>
                            </span>
                            <div>
                                <div class="font-semibold text-sm normal-case tracking-normal">资料查找</div>
                                <div class="text-xs text-gray-500 normal-case tracking-normal">歌单、曲库、Acappella</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <a href="{{ url_for('about') }}" class="hover:text-purple-400 transition">关于我们</a>
        </div>

        <a href="{{ url_for('index') }}#courses" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-full text-sm font-bold transition neon-border">
            开始学习
        </a>
    </nav>

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    <footer class="bg-zinc-950 border-t border-white/5 py-12 text-center text-gray-500">
        <p class="font-orbitron text-xs tracking-widest mb-2">BEATLAB ACADEMY</p>
        <p class="text-sm">© 2026 BEATLAB ACADEMY. 基于热爱，为乐手而生。</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
