<a href="{{ href }}" class="bg-zinc-900 border border-white/5 hover:border-{{ color }}-500/40 rounded-2xl p-6 flex items-start gap-6 transition-all group cursor-pointer block">
    <div class="w-14 h-14 bg-{{ color }}-600/20 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-{{ color }}-600/40 transition">
        <i class="{{ icon }} text-{{ color }}-400 text-xl"></i>
    </div>
    <div>
        <h3 class="text-xl font-bold mb-2">{{ title }}</h3>
        <p class="text-gray-400 text-sm leading-relaxed">{{ desc }}</p>
        <span class="inline-block mt-3 text-xs text-{{ color }}-400 font-semibold uppercase tracking-widest">{{ meta }}</span>
    </div>
</a>
