<div class="bg-zinc-900 border border-white/5 rounded-2xl p-6" data-waveform-player>
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-5">
        <div>
            <h2 class="text-2xl font-bold text-purple-400">波形分析播放器</h2>
            <p class="text-gray-400 text-sm mt-1">上传本地音频后可显示波形；下方以 Martin Garrix - Animals 的结构时间点做教学示例。</p>
        </div>
        <label class="bg-purple-600 hover:bg-purple-700 px-5 py-3 rounded-full font-bold transition cursor-pointer text-center">
            选择音频文件
            <input type="file" accept="audio/*" class="hidden" data-audio-input>
        </label>
    </div>

    <div class="rounded-xl overflow-hidden bg-black border border-purple-900/30">
        <canvas data-waveform-canvas class="w-full h-40 block"></canvas>
    </div>

    <div class="flex flex-col md:flex-row md:items-center gap-4 mt-5">
        <button data-play-button class="bg-zinc-800 hover:bg-zinc-700 border border-white/10 px-5 py-3 rounded-full font-bold transition" disabled>
            <i class="fas fa-play mr-2"></i> 播放 / 暂停
        </button>
        <div class="text-sm text-gray-400" data-time-label>未加载音频</div>
    </div>

    <div class="mt-6 grid md:grid-cols-2 gap-4" data-markers>
        <button class="text-left bg-purple-600/10 border border-purple-500/20 rounded-xl p-4 hover:bg-purple-600/20 transition" data-start="0" data-end="30">
            <div class="font-bold text-purple-300">0:00 - 0:30 Intro 前奏</div>
            <div class="text-sm text-gray-400 mt-1">鼓组和节奏进入，适合练习找第一个入歌点。</div>
        </button>
        <button class="text-left bg-blue-600/10 border border-blue-500/20 rounded-xl p-4 hover:bg-blue-600/20 transition" data-start="30" data-end="60">
            <div class="font-bold text-blue-300">0:30 - 1:00 Breakdown 空拍</div>
            <div class="text-sm text-gray-400 mt-1">旋律和情绪铺垫，鼓点减少，能量暂时下降。</div>
        </button>
        <button class="text-left bg-yellow-600/10 border border-yellow-500/20 rounded-xl p-4 hover:bg-yellow-600/20 transition" data-start="60" data-end="75">
            <div class="font-bold text-yellow-300">1:00 - 1:15 Build Up 聚合</div>
            <div class="text-sm text-gray-400 mt-1">节奏和张力逐渐加强，准备进入高潮。</div>
        </button>
        <button class="text-left bg-pink-600/10 border border-pink-500/20 rounded-xl p-4 hover:bg-pink-600/20 transition" data-start="75" data-end="105">
            <div class="font-bold text-pink-300">1:15 - 1:45 Drop 高潮</div>
            <div class="text-sm text-gray-400 mt-1">主能量释放，是学生最容易听出结构变化的部分。</div>
        </button>
    </div>

    <audio data-audio-element class="hidden"></audio>
</div>
